services:

  app1:
    build: ../app
    restart: always

  app2:
    build: ../app
    restart: always

  app3:
    build: ../app
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "8080:8080"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3
    restart: always

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - prometheus